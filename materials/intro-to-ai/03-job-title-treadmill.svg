<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="titleGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <marker id="arrow3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8888aa"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg3)"/>

  <!-- Header -->
  <text x="80" y="90" font-size="40" font-weight="800" fill="url(#titleGrad3)">The Job Title Keeps Changing &#8212; Fast</text>
  <text x="80" y="130" font-size="22" fill="#a0a0c0">Prompt Engineer &#8594; Vibe Coder &#8594; Agentic Engineer &#8594; Loop Engineer &#8594; ...then what?</text>

  <!-- Connector arrows between columns -->
  <line x1="374" y1="430" x2="392" y2="430" stroke="#8888aa" stroke-width="2" marker-end="url(#arrow3)"/>
  <line x1="654" y1="430" x2="672" y2="430" stroke="#8888aa" stroke-width="2" marker-end="url(#arrow3)"/>
  <line x1="934" y1="430" x2="952" y2="430" stroke="#8888aa" stroke-width="2" marker-end="url(#arrow3)"/>
  <line x1="1214" y1="430" x2="1232" y2="430" stroke="#8888aa" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- Column 1: 2024 Prompt Engineer -->
  <g transform="translate(110,190)">
    <rect width="260" height="480" rx="20" fill="#8b5cf6" fill-opacity="0.10" stroke="#8b5cf6" stroke-width="2"/>
    <text x="130" y="55" font-size="13" font-weight="700" fill="#c4b5fd" text-anchor="middle">2024</text>
    <text x="130" y="150" font-size="52" text-anchor="middle">&#128187;</text>
    <text x="130" y="205" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Prompt Engineer</text>
    <text x="24" y="245" font-size="12.5" fill="#c0c0d0">One person, careful</text>
    <text x="24" y="265" font-size="12.5" fill="#c0c0d0">wording, one chat</text>
    <text x="24" y="285" font-size="12.5" fill="#c0c0d0">window at a time.</text>
  </g>

  <!-- Column 2: 2025 Vibe Coder -->
  <g transform="translate(390,190)">
    <rect width="260" height="480" rx="20" fill="#5b7cfa" fill-opacity="0.10" stroke="#5b7cfa" stroke-width="2"/>
    <text x="130" y="55" font-size="13" font-weight="700" fill="#9db1fb" text-anchor="middle">2025</text>
    <text x="130" y="150" font-size="52" text-anchor="middle">&#128717;&#65039;</text>
    <text x="130" y="205" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Vibe Coder</text>
    <text x="24" y="245" font-size="12.5" fill="#c0c0d0">Describe the outcome,</text>
    <text x="24" y="265" font-size="12.5" fill="#c0c0d0">let the model write</text>
    <text x="24" y="285" font-size="12.5" fill="#c0c0d0">and fix the code.</text>
  </g>

  <!-- Column 3: 2026 Agentic Engineering -->
  <g transform="translate(670,190)">
    <rect width="260" height="480" rx="20" fill="#d97706" fill-opacity="0.10" stroke="#d97706" stroke-width="2"/>
    <text x="130" y="55" font-size="13" font-weight="700" fill="#f3b978" text-anchor="middle">2026</text>
    <text x="130" y="150" font-size="52" text-anchor="middle">&#129302;</text>
    <text x="130" y="205" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Agentic Engineer</text>
    <text x="24" y="245" font-size="12.5" fill="#c0c0d0">Directs a handful of</text>
    <text x="24" y="265" font-size="12.5" fill="#c0c0d0">agents working in</text>
    <text x="24" y="285" font-size="12.5" fill="#c0c0d0">parallel at once.</text>
  </g>

  <!-- Column 4: 2026.5 Loop Engineering -->
  <g transform="translate(950,190)">
    <rect width="260" height="480" rx="20" fill="#0d9488" fill-opacity="0.10" stroke="#0d9488" stroke-width="2"/>
    <text x="130" y="55" font-size="13" font-weight="700" fill="#5fd4c6" text-anchor="middle">2026.5</text>
    <text x="130" y="150" font-size="52" text-anchor="middle">&#128257;</text>
    <text x="130" y="205" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Loop Engineer</text>
    <text x="24" y="245" font-size="12.5" fill="#c0c0d0">Sets up a self-running</text>
    <text x="24" y="265" font-size="12.5" fill="#c0c0d0">loop of agents that</text>
    <text x="24" y="285" font-size="12.5" fill="#c0c0d0">improve each other.</text>
  </g>

  <!-- Column 5: 2027 Unemployed -->
  <g transform="translate(1230,190)">
    <rect width="260" height="480" rx="20" fill="#f5576c" fill-opacity="0.14" stroke="#f5576c" stroke-width="2.5" stroke-dasharray="8,6"/>
    <text x="130" y="55" font-size="13" font-weight="700" fill="#ffb3bd" text-anchor="middle">2027?</text>
    <text x="130" y="150" font-size="52" text-anchor="middle">&#128230;</text>
    <text x="130" y="205" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Unemployed</text>
    <text x="24" y="245" font-size="12.5" fill="#ffc9d1">The agents now</text>
    <text x="24" y="265" font-size="12.5" fill="#ffc9d1">manage each other</text>
    <text x="24" y="285" font-size="12.5" fill="#ffc9d1">&#8212; if you stopped adapting.</text>
  </g>

  <!-- Callout -->
  <rect x="230" y="720" width="1140" height="100" rx="16" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
  <text x="800" y="758" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">It&#8217;s satire, but the pace is real: the job title reinvents itself faster than a resume update.</text>
  <text x="800" y="792" font-size="16" fill="#c0c0d0" text-anchor="middle">Staying fluent in whatever comes next isn&#8217;t optional &#8212; it&#8217;s the actual job now.</text>

  <!-- Footer -->
  <text x="80" y="860" font-size="14" fill="#8888aa">SaturdAI &#183; Intro to AI</text>
</svg>
