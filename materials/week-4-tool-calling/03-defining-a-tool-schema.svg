<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <marker id="arrow3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8888aa"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Header -->
  <text x="80" y="90" font-size="40" font-weight="800" fill="url(#titleGrad)">Defining a Tool Schema</text>
  <text x="80" y="130" font-size="22" fill="#a0a0c0">A tool is described to the model, not written into it &#8212; name, description, and parameters.</text>

  <!-- Code panel -->
  <rect x="80" y="190" width="760" height="600" rx="20" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
  <g font-family="'SFMono-Regular', Consolas, monospace" font-size="16">
    <text x="112" y="240" fill="#8888aa">{</text>
    <text x="132" y="272" fill="#5b7cfa" font-weight="700">"name"</text>
    <text x="220" y="272" fill="#c0c0d0">: "get_weather",</text>
    <text x="132" y="308" fill="#0d9488" font-weight="700">"description"</text>
    <text x="290" y="308" fill="#c0c0d0">: "Get the current</text>
    <text x="132" y="332" fill="#c0c0d0">weather for a location",</text>
    <text x="132" y="368" fill="#d97706" font-weight="700">"parameters"</text>
    <text x="272" y="368" fill="#c0c0d0">: {</text>
    <text x="160" y="400" fill="#c0c0d0">"type": "object",</text>
    <text x="160" y="428" fill="#c0c0d0">"properties": {</text>
    <text x="188" y="456" fill="#d97706">"location"</text>
    <text x="296" y="456" fill="#c0c0d0">: { "type": "string" },</text>
    <text x="188" y="484" fill="#d97706">"unit"</text>
    <text x="260" y="484" fill="#c0c0d0">: { "type": "string",</text>
    <text x="272" y="508" fill="#c0c0d0">"enum": ["celsius","fahrenheit"] }</text>
    <text x="160" y="536" fill="#c0c0d0">},</text>
    <text x="160" y="568" fill="#ec4899" font-weight="700">"required"</text>
    <text x="272" y="568" fill="#c0c0d0">: ["location"]</text>
    <text x="132" y="600" fill="#c0c0d0">}</text>
    <text x="112" y="632" fill="#8888aa">}</text>
  </g>

  <!-- Callouts on the right -->
  <g>
    <circle cx="944" cy="272" r="7" fill="#5b7cfa"/>
    <rect x="960" y="222" width="560" height="86" rx="14" fill="#5b7cfa" fill-opacity="0.12" stroke="#5b7cfa" stroke-width="2"/>
    <text x="984" y="252" font-size="16" font-weight="700" fill="#9db1fb">name</text>
    <text x="984" y="278" font-size="14" fill="#c0c0d0">A short, unique identifier the model uses</text>
    <text x="984" y="298" font-size="14" fill="#c0c0d0">to refer to this exact tool.</text>
    <path d="M944,272 L960,265" stroke="#5b7cfa" stroke-width="2" fill="none" marker-end="url(#arrow3)"/>
  </g>

  <g>
    <circle cx="944" cy="316" r="7" fill="#0d9488"/>
    <rect x="960" y="326" width="560" height="86" rx="14" fill="#0d9488" fill-opacity="0.12" stroke="#0d9488" stroke-width="2"/>
    <text x="984" y="356" font-size="16" font-weight="700" fill="#5fd4c6">description</text>
    <text x="984" y="382" font-size="14" fill="#c0c0d0">Plain language the model reads to decide</text>
    <text x="984" y="402" font-size="14" fill="#c0c0d0">*when* this tool is the right one to use.</text>
    <path d="M944,316 L960,369" stroke="#0d9488" stroke-width="2" fill="none" marker-end="url(#arrow3)"/>
  </g>

  <g>
    <circle cx="944" cy="452" r="7" fill="#d97706"/>
    <rect x="960" y="430" width="560" height="106" rx="14" fill="#d97706" fill-opacity="0.12" stroke="#d97706" stroke-width="2"/>
    <text x="984" y="460" font-size="16" font-weight="700" fill="#f3b978">parameters</text>
    <text x="984" y="486" font-size="14" fill="#c0c0d0">A JSON-Schema-style spec of every argument:</text>
    <text x="984" y="506" font-size="14" fill="#c0c0d0">its type, allowed values (enum), and</text>
    <text x="984" y="526" font-size="14" fill="#c0c0d0">description &#8212; this is what keeps arguments valid.</text>
    <path d="M944,452 L960,483" stroke="#d97706" stroke-width="2" fill="none" marker-end="url(#arrow3)"/>
  </g>

  <g>
    <circle cx="944" cy="568" r="7" fill="#ec4899"/>
    <rect x="960" y="556" width="560" height="86" rx="14" fill="#ec4899" fill-opacity="0.12" stroke="#ec4899" stroke-width="2"/>
    <text x="984" y="586" font-size="16" font-weight="700" fill="#f5a8c9">required</text>
    <text x="984" y="612" font-size="14" fill="#c0c0d0">Which fields must be filled in before the call</text>
    <text x="984" y="632" font-size="14" fill="#c0c0d0">is considered valid &#8212; here, only location.</text>
    <path d="M944,568 L960,599" stroke="#ec4899" stroke-width="2" fill="none" marker-end="url(#arrow3)"/>
  </g>

  <rect x="960" y="666" width="560" height="110" rx="16" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
  <text x="984" y="700" font-size="15" font-weight="700" fill="#ffffff">&#128161; The model never sees your code</text>
  <text x="984" y="726" font-size="14" fill="#c0c0d0">It only sees this description &#8212; good names and</text>
  <text x="984" y="748" font-size="14" fill="#c0c0d0">clear descriptions directly improve accuracy.</text>

  <!-- Footer -->
  <text x="80" y="866" font-size="14" fill="#8888aa">SaturdAI &#183; Week 4: Tool Calling</text>
  <text x="1520" y="866" font-size="14" fill="#8888aa" text-anchor="end">3 / 10</text>
</svg>
