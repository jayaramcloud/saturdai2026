<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <marker id="arrow5" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ffffff" fill-opacity="0.5"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Header -->
  <text x="80" y="90" font-size="40" font-weight="800" fill="url(#titleGrad)">Error Handling &amp; Retries</text>
  <text x="80" y="130" font-size="22" fill="#a0a0c0">A failed tool call isn&#8217;t a dead end &#8212; the error goes back to the model, not to a crash.</text>

  <!-- Flow -->
  <g transform="translate(220,300)">
    <circle r="60" fill="#5b7cfa" fill-opacity="0.9"/>
    <text y="10" font-size="30" text-anchor="middle">&#9881;&#65039;</text>
    <text x="0" y="100" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle">Tool call is</text>
    <text x="0" y="122" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle">attempted</text>
  </g>
  <path d="M300,300 L520,300" stroke="#ffffff" stroke-opacity="0.3" stroke-width="4" marker-end="url(#arrow5)"/>

  <g transform="translate(600,300)">
    <circle r="60" fill="#f5576c" fill-opacity="0.9"/>
    <text y="10" font-size="30" text-anchor="middle">&#9888;&#65039;</text>
    <text x="0" y="100" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle">It fails &#8212; bad args,</text>
    <text x="0" y="122" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle">outage, or timeout</text>
  </g>
  <path d="M680,300 L900,300" stroke="#ffffff" stroke-opacity="0.3" stroke-width="4" marker-end="url(#arrow5)"/>

  <g transform="translate(980,300)">
    <circle r="60" fill="#d97706" fill-opacity="0.9"/>
    <text y="10" font-size="30" text-anchor="middle">&#128257;</text>
    <text x="0" y="100" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle">Error message is</text>
    <text x="0" y="122" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle">returned to the model</text>
  </g>
  <path d="M1060,300 L1280,300" stroke="#ffffff" stroke-opacity="0.3" stroke-width="4" marker-end="url(#arrow5)"/>

  <g transform="translate(1360,300)">
    <circle r="60" fill="#16a34a" fill-opacity="0.9"/>
    <text y="10" font-size="30" text-anchor="middle">&#129504;</text>
    <text x="0" y="100" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle">Model decides</text>
    <text x="0" y="122" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle">what to do next</text>
  </g>

  <text x="80" y="470" font-size="15" fill="#8888aa" font-style="italic">The model sees the exact error text &#8212; specific, structured errors lead to smarter recoveries than a generic "failed."</text>

  <!-- Two boxes: causes / recoveries -->
  <rect x="80" y="520" width="700" height="290" rx="24" fill="#f5576c" fill-opacity="0.08" stroke="#f5576c" stroke-width="2.5"/>
  <text x="112" y="570" font-size="22" font-weight="800" fill="#ffffff">Common causes</text>
  <text x="150" y="612" font-size="16" fill="#c0c0d0">&#8226; Bad arguments &#8212; wrong type, missing field</text>
  <text x="150" y="648" font-size="16" fill="#c0c0d0">&#8226; API down &#8212; the backing service is unavailable</text>
  <text x="150" y="684" font-size="16" fill="#c0c0d0">&#8226; Timeout &#8212; the call took too long to respond</text>
  <text x="150" y="720" font-size="16" fill="#c0c0d0">&#8226; Permission denied &#8212; the action isn&#8217;t allowed</text>
  <text x="112" y="770" font-size="14" fill="#f5a3ac" font-style="italic">Each should return a clear, structured error &#8212;</text>
  <text x="112" y="792" font-size="14" fill="#f5a3ac" font-style="italic">never fail silently.</text>

  <rect x="820" y="520" width="700" height="290" rx="24" fill="#16a34a" fill-opacity="0.08" stroke="#16a34a" stroke-width="2.5"/>
  <text x="852" y="570" font-size="22" font-weight="800" fill="#ffffff">&#9989; Graceful recoveries</text>
  <text x="890" y="612" font-size="16" fill="#c0c0d0">&#8226; Retry &#8212; fix the arguments and call it again</text>
  <text x="890" y="648" font-size="16" fill="#c0c0d0">&#8226; Ask &#8212; request clarification from the user</text>
  <text x="890" y="684" font-size="16" fill="#c0c0d0">&#8226; Fall back &#8212; try another tool or answer partially</text>
  <text x="890" y="720" font-size="16" fill="#c0c0d0">&#8226; Report &#8212; explain plainly what went wrong</text>
  <text x="852" y="770" font-size="14" fill="#86efac" font-style="italic">Good error text turns a failure into just another</text>
  <text x="852" y="792" font-size="14" fill="#86efac" font-style="italic">step in the loop.</text>

  <!-- Footer -->
  <text x="80" y="866" font-size="14" fill="#8888aa">SaturdAI &#183; Week 4: Tool Calling</text>
  <text x="1520" y="866" font-size="14" fill="#8888aa" text-anchor="end">5 / 10</text>
</svg>
