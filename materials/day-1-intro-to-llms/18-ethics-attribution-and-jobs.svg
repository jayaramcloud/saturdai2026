<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Header -->
  <text x="80" y="90" font-size="40" font-weight="800" fill="url(#titleGrad)">Ethics: Ownership, Credit &amp; Impact</text>
  <text x="80" y="130" font-size="22" fill="#a0a0c0">Using AI well means being honest about what it did &#8212; and who else it affects.</text>

  <!-- Card 1: Attribution -->
  <rect x="80" y="190" width="453" height="560" rx="22" fill="#d97706" fill-opacity="0.10" stroke="#d97706" stroke-width="2.5"/>
  <text x="112" y="240" font-size="32">&#9997;&#65039;</text>
  <text x="112" y="286" font-size="22" font-weight="800" fill="#ffffff">Passing Off Work</text>
  <text x="112" y="316" font-size="15" fill="#a0a0c0">Submitting AI-written work as</text>
  <text x="112" y="336" font-size="15" fill="#a0a0c0">entirely your own, where honesty</text>
  <text x="112" y="356" font-size="15" fill="#a0a0c0">about authorship matters.</text>
  <rect x="112" y="392" width="389" height="130" rx="12" fill="#ffffff" fill-opacity="0.05"/>
  <text x="132" y="422" font-size="14" font-weight="700" fill="#f3b978">EXAMPLE</text>
  <text x="132" y="450" font-size="14" fill="#c0c0d0">A school essay or client report</text>
  <text x="132" y="472" font-size="14" fill="#c0c0d0">with no disclosure of AI use.</text>
  <text x="112" y="556" font-size="14" font-weight="700" fill="#86efac">&#9989; Guard: disclose AI assistance</text>
  <text x="112" y="578" font-size="14" fill="#c0c0d0">where the rules or relationship expect it.</text>

  <!-- Card 2: Training data / IP -->
  <rect x="573" y="190" width="453" height="560" rx="22" fill="#8b5cf6" fill-opacity="0.10" stroke="#8b5cf6" stroke-width="2.5"/>
  <text x="605" y="240" font-size="32">&#128220;</text>
  <text x="605" y="286" font-size="22" font-weight="800" fill="#ffffff">Whose Work Trained It</text>
  <text x="605" y="316" font-size="15" fill="#a0a0c0">Models learn from writers, artists,</text>
  <text x="605" y="336" font-size="15" fill="#a0a0c0">and coders who mostly didn't</text>
  <text x="605" y="356" font-size="15" fill="#a0a0c0">choose to be training data.</text>
  <rect x="605" y="392" width="389" height="130" rx="12" fill="#ffffff" fill-opacity="0.05"/>
  <text x="625" y="422" font-size="14" font-weight="700" fill="#c4b5fd">EXAMPLE</text>
  <text x="625" y="450" font-size="14" fill="#c0c0d0">Generated art in a style close</text>
  <text x="625" y="472" font-size="14" fill="#c0c0d0">to a specific living artist.</text>
  <text x="605" y="556" font-size="14" font-weight="700" fill="#86efac">&#9989; Guard: for commercial work,</text>
  <text x="605" y="578" font-size="14" fill="#c0c0d0">check your provider's usage and licensing terms.</text>

  <!-- Card 3: Livelihoods -->
  <rect x="1066" y="190" width="453" height="560" rx="22" fill="#f5576c" fill-opacity="0.10" stroke="#f5576c" stroke-width="2.5"/>
  <text x="1098" y="240" font-size="32">&#128188;</text>
  <text x="1098" y="286" font-size="22" font-weight="800" fill="#ffffff">Real People, Real Jobs</text>
  <text x="1098" y="316" font-size="15" fill="#a0a0c0">Automating a task often means</text>
  <text x="1098" y="336" font-size="15" fill="#a0a0c0">automating someone's paid</text>
  <text x="1098" y="356" font-size="15" fill="#a0a0c0">work, not just a chore.</text>
  <rect x="1098" y="392" width="389" height="130" rx="12" fill="#ffffff" fill-opacity="0.05"/>
  <text x="1118" y="422" font-size="14" font-weight="700" fill="#f5a3ac">EXAMPLE</text>
  <text x="1118" y="450" font-size="14" fill="#c0c0d0">Replacing freelance copywriting</text>
  <text x="1118" y="472" font-size="14" fill="#c0c0d0">or support work entirely with AI.</text>
  <text x="1098" y="556" font-size="14" font-weight="700" fill="#86efac">&#9989; Guard: consider AI as a tool</text>
  <text x="1098" y="578" font-size="14" fill="#c0c0d0">that changes work, and think through who it affects.</text>

  <!-- Bottom note -->
  <rect x="80" y="770" width="1440" height="60" rx="16" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
  <text x="112" y="806" font-size="16" fill="#e0e0f0">&#128161; None of this means don't use AI &#8212; it means using it thoughtfully, with the same judgment you'd apply anywhere else.</text>

  <!-- Footer -->
  <text x="80" y="866" font-size="14" fill="#8888aa">SaturdAI &#183; Day 1: Intro to LLMs</text>
  <text x="1520" y="866" font-size="14" fill="#8888aa" text-anchor="end">18 / 19</text>
</svg>
