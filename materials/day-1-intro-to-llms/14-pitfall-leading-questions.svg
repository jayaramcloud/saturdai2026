<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Header -->
  <text x="80" y="90" font-size="40" font-weight="800" fill="url(#titleGrad)">Pitfall: Leading Questions Bias the Answer</text>
  <text x="80" y="130" font-size="22" fill="#a0a0c0">Phrase a question with the answer baked in, and the model tends to agree with you.</text>

  <!-- Leading (left) -->
  <rect x="80" y="190" width="680" height="600" rx="24" fill="#ec4899" fill-opacity="0.08" stroke="#ec4899" stroke-width="2.5"/>
  <text x="112" y="238" font-size="15" font-weight="800" fill="#f5a8c9">&#10060; LEADING QUESTION</text>
  <rect x="112" y="260" width="616" height="90" rx="14" fill="#ffffff" fill-opacity="0.06"/>
  <text x="134" y="298" font-size="19" fill="#ffffff" font-style="italic">&#8220;Isn't option A clearly better</text>
  <text x="134" y="322" font-size="19" fill="#ffffff" font-style="italic">than option B?&#8221;</text>

  <text x="112" y="392" font-size="16" font-weight="700" fill="#f5a8c9">Why it goes wrong:</text>
  <text x="134" y="424" font-size="15" fill="#c0c0d0">&#8226; The framing already picks a winner</text>
  <text x="134" y="452" font-size="15" fill="#c0c0d0">&#8226; The model tends to agree with the</text>
  <text x="134" y="480" font-size="15" fill="#c0c0d0">&nbsp;&nbsp;premise it was handed</text>
  <text x="134" y="508" font-size="15" fill="#c0c0d0">&#8226; Real trade-offs of option B go unmentioned</text>

  <rect x="112" y="548" width="616" height="200" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="134" y="582" font-size="14" font-weight="700" fill="#f5a8c9">RESULT</text>
  <text x="134" y="612" font-size="15" fill="#c0c0d0">You get your own opinion reflected back</text>
  <text x="134" y="636" font-size="15" fill="#c0c0d0">at you with extra confidence &#8212; not an</text>
  <text x="134" y="660" font-size="15" fill="#c0c0d0">independent evaluation of the actual</text>
  <text x="134" y="684" font-size="15" fill="#c0c0d0">trade-offs.</text>

  <!-- Arrow -->
  <g transform="translate(800,490)">
    <path d="M-30,0 L30,0 M14,-16 L30,0 L14,16" fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Neutral (right) -->
  <rect x="840" y="190" width="680" height="600" rx="24" fill="#16a34a" fill-opacity="0.08" stroke="#16a34a" stroke-width="2.5"/>
  <text x="872" y="238" font-size="15" font-weight="800" fill="#86efac">&#9989; NEUTRAL QUESTION</text>
  <rect x="872" y="260" width="616" height="130" rx="14" fill="#ffffff" fill-opacity="0.06"/>
  <text x="894" y="292" font-size="17" fill="#ffffff" font-style="italic">&#8220;Compare option A and option B</text>
  <text x="894" y="318" font-size="17" fill="#ffffff" font-style="italic">on cost, speed, and risk. Which is</text>
  <text x="894" y="344" font-size="17" fill="#ffffff" font-style="italic">better, and why?&#8221;</text>

  <text x="872" y="422" font-size="16" font-weight="700" fill="#86efac">Why it works:</text>
  <text x="894" y="454" font-size="15" fill="#c0c0d0">&#8226; No answer is assumed up front</text>
  <text x="894" y="482" font-size="15" fill="#c0c0d0">&#8226; Explicit criteria force a real comparison</text>
  <text x="894" y="510" font-size="15" fill="#c0c0d0">&#8226; A verdict, when given, comes with reasons</text>

  <rect x="872" y="588" width="616" height="160" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="894" y="622" font-size="14" font-weight="700" fill="#86efac">RESULT</text>
  <text x="894" y="652" font-size="15" fill="#c0c0d0">A balanced comparison you can actually</text>
  <text x="894" y="676" font-size="15" fill="#c0c0d0">weigh against your own judgment.</text>

  <!-- Footer -->
  <text x="80" y="866" font-size="14" fill="#8888aa">SaturdAI &#183; Day 1: Intro to LLMs</text>
  <text x="1520" y="866" font-size="14" fill="#8888aa" text-anchor="end">14 / 19</text>
</svg>
