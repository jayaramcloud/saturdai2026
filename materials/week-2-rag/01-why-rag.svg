<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Header -->
  <text x="80" y="90" font-size="40" font-weight="800" fill="url(#titleGrad)">Why RAG?</text>
  <text x="80" y="130" font-size="22" fill="#a0a0c0">LLMs freeze at training time &#8212; RAG lets them read fresh, private documents before answering.</text>

  <!-- Left card: the problem -->
  <rect x="80" y="190" width="670" height="560" rx="22" fill="#f5576c" fill-opacity="0.10" stroke="#f5576c" stroke-width="2.5"/>
  <text x="112" y="240" font-size="32">&#128274;</text>
  <text x="112" y="286" font-size="24" font-weight="800" fill="#ffffff">Without RAG: frozen knowledge</text>
  <text x="112" y="320" font-size="16" fill="#a0a0c0">An LLM only knows what was in its</text>
  <text x="112" y="342" font-size="16" fill="#a0a0c0">training data, up to a cutoff date.</text>

  <rect x="112" y="374" width="606" height="90" rx="12" fill="#ffffff" fill-opacity="0.05"/>
  <text x="132" y="404" font-size="14" font-weight="700" fill="#f5a3ac">STALE</text>
  <text x="132" y="428" font-size="14" fill="#c0c0d0">Doesn&#8217;t know about this morning&#8217;s news or last week&#8217;s release.</text>

  <rect x="112" y="480" width="606" height="90" rx="12" fill="#ffffff" fill-opacity="0.05"/>
  <text x="132" y="510" font-size="14" font-weight="700" fill="#f5a3ac">BLIND TO YOUR DATA</text>
  <text x="132" y="534" font-size="14" fill="#c0c0d0">Has never seen your company&#8217;s docs, tickets, or private files.</text>

  <rect x="112" y="586" width="606" height="90" rx="12" fill="#ffffff" fill-opacity="0.05"/>
  <text x="132" y="616" font-size="14" font-weight="700" fill="#f5a3ac">GUESSES CONFIDENTLY</text>
  <text x="132" y="640" font-size="14" fill="#c0c0d0">Fills gaps with a plausible-sounding guess instead of admitting it doesn&#8217;t know.</text>

  <!-- Right card: the fix -->
  <rect x="850" y="190" width="670" height="560" rx="22" fill="#8b5cf6" fill-opacity="0.14" stroke="#c4b5fd" stroke-width="3" filter="url(#glow)"/>
  <text x="882" y="240" font-size="32">&#128218;</text>
  <text x="882" y="286" font-size="24" font-weight="800" fill="#ffffff">With RAG: grounded answers</text>
  <text x="882" y="320" font-size="16" fill="#e9e4fc">Retrieval-Augmented Generation looks</text>
  <text x="882" y="342" font-size="16" fill="#e9e4fc">things up before answering.</text>

  <rect x="882" y="374" width="606" height="90" rx="12" fill="#ffffff" fill-opacity="0.08"/>
  <text x="902" y="404" font-size="14" font-weight="700" fill="#c4b5fd">FRESH</text>
  <text x="902" y="428" font-size="14" fill="#e0e0f0">Pulls from documents updated today, not just training time.</text>

  <rect x="882" y="480" width="606" height="90" rx="12" fill="#ffffff" fill-opacity="0.08"/>
  <text x="902" y="510" font-size="14" font-weight="700" fill="#c4b5fd">PRIVATE</text>
  <text x="902" y="534" font-size="14" fill="#e0e0f0">Can search your own docs &#8212; without retraining the model.</text>

  <rect x="882" y="586" width="606" height="90" rx="12" fill="#ffffff" fill-opacity="0.08"/>
  <text x="902" y="616" font-size="14" font-weight="700" fill="#c4b5fd">CITED</text>
  <text x="902" y="640" font-size="14" fill="#e0e0f0">Answers can point back to the exact source passage used.</text>

  <!-- Footer -->
  <text x="80" y="866" font-size="14" fill="#8888aa">SaturdAI &#183; Week 2: RAG</text>
  <text x="1520" y="866" font-size="14" fill="#8888aa" text-anchor="end">1 / 10</text>
</svg>
