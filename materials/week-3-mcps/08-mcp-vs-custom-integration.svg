<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Header -->
  <text x="80" y="90" font-size="40" font-weight="800" fill="url(#titleGrad)">MCP vs. a Custom Integration</text>
  <text x="80" y="130" font-size="22" fill="#a0a0c0">What actually changes when you build to a shared standard instead of a one-off.</text>

  <!-- Table header -->
  <text x="700" y="200" font-size="16" font-weight="800" fill="#a0a0c0" text-anchor="middle">CUSTOM INTEGRATION</text>
  <text x="1200" y="200" font-size="16" font-weight="800" fill="#c4b5fd" text-anchor="middle">MCP</text>

  <!-- Row 1 -->
  <text x="80" y="256" font-size="18" font-weight="700" fill="#ffffff">Reusability</text>
  <rect x="560" y="228" width="280" height="46" rx="10" fill="#ffffff" fill-opacity="0.05"/>
  <text x="700" y="258" font-size="15" fill="#c0c0d0" text-anchor="middle">One-off, tied to one app</text>
  <rect x="1060" y="228" width="280" height="46" rx="10" fill="#8b5cf6" fill-opacity="0.18" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="1200" y="258" font-size="15" fill="#e9e4fc" text-anchor="middle">Works with any MCP client</text>
  <line x1="80" y1="290" x2="1520" y2="290" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- Row 2 -->
  <text x="80" y="336" font-size="18" font-weight="700" fill="#ffffff">Maintenance</text>
  <rect x="560" y="308" width="280" height="46" rx="10" fill="#ffffff" fill-opacity="0.05"/>
  <text x="700" y="338" font-size="15" fill="#c0c0d0" text-anchor="middle">Rebuilt per app you add</text>
  <rect x="1060" y="308" width="280" height="46" rx="10" fill="#8b5cf6" fill-opacity="0.18" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="1200" y="338" font-size="15" fill="#e9e4fc" text-anchor="middle">Maintained once, by anyone</text>
  <line x1="80" y1="370" x2="1520" y2="370" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- Row 3 -->
  <text x="80" y="416" font-size="18" font-weight="700" fill="#ffffff">Discovery</text>
  <rect x="560" y="388" width="280" height="46" rx="10" fill="#ffffff" fill-opacity="0.05"/>
  <text x="700" y="418" font-size="15" fill="#c0c0d0" text-anchor="middle">Hardcoded tool list</text>
  <rect x="1060" y="388" width="280" height="46" rx="10" fill="#8b5cf6" fill-opacity="0.18" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="1200" y="418" font-size="15" fill="#e9e4fc" text-anchor="middle">Client discovers tools live</text>
  <line x1="80" y1="450" x2="1520" y2="450" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- Row 4 -->
  <text x="80" y="496" font-size="18" font-weight="700" fill="#ffffff">Switching AI apps</text>
  <rect x="560" y="468" width="280" height="46" rx="10" fill="#ffffff" fill-opacity="0.05"/>
  <text x="700" y="498" font-size="15" fill="#c0c0d0" text-anchor="middle">Start integration over</text>
  <rect x="1060" y="468" width="280" height="46" rx="10" fill="#8b5cf6" fill-opacity="0.18" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="1200" y="498" font-size="15" fill="#e9e4fc" text-anchor="middle">Point the new app at the same server</text>
  <line x1="80" y1="530" x2="1520" y2="530" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- Row 5 -->
  <text x="80" y="576" font-size="18" font-weight="700" fill="#ffffff">Ecosystem</text>
  <rect x="560" y="548" width="280" height="46" rx="10" fill="#ffffff" fill-opacity="0.05"/>
  <text x="700" y="578" font-size="15" fill="#c0c0d0" text-anchor="middle">You&#8217;re on your own</text>
  <rect x="1060" y="548" width="280" height="46" rx="10" fill="#8b5cf6" fill-opacity="0.18" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="1200" y="578" font-size="15" fill="#e9e4fc" text-anchor="middle">Growing directory of shared servers</text>

  <!-- Bottom takeaway -->
  <rect x="80" y="660" width="1440" height="160" rx="24" fill="#16a34a" fill-opacity="0.10" stroke="#16a34a" stroke-width="2.5"/>
  <text x="112" y="704" font-size="20" font-weight="800" fill="#86efac">&#128161; When to still build custom</text>
  <text x="112" y="736" font-size="16" fill="#e0e0f0">A quick internal script calling one API directly can still be the fastest path for a single, throwaway use case.</text>
  <text x="112" y="762" font-size="16" fill="#e0e0f0">MCP pays off once more than one app or user needs the same capability.</text>
  <text x="112" y="794" font-size="14" fill="#a0a0c0" font-style="italic">Rule of thumb: build once as MCP if you&#8217;ll ever want to reuse it.</text>

  <!-- Footer -->
  <text x="80" y="866" font-size="14" fill="#8888aa">SaturdAI &#183; Week 3: MCPs</text>
  <text x="1520" y="866" font-size="14" fill="#8888aa" text-anchor="end">8 / 10</text>
</svg>
