<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a0a0c0"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Header -->
  <text x="80" y="90" font-size="40" font-weight="800" fill="url(#titleGrad)">How a Tool Call Flows Through MCP</text>
  <text x="80" y="130" font-size="22" fill="#a0a0c0">One question triggers a round trip through the client and server before you see an answer.</text>

  <!-- Loop nodes -->
  <g transform="translate(160,220)">
    <rect width="300" height="150" rx="18" fill="#5b7cfa" fill-opacity="0.16" stroke="#5b7cfa" stroke-width="2.5"/>
    <text x="24" y="40" font-size="15" font-weight="700" fill="#9db1fb">STEP 1</text>
    <text x="24" y="70" font-size="20" font-weight="700" fill="#ffffff">You ask a question</text>
    <text x="24" y="98" font-size="14" fill="#c0c0d0">&#8220;What&#8217;s open in my</text>
    <text x="24" y="118" font-size="14" fill="#c0c0d0">repo right now?&#8221;</text>
  </g>

  <g transform="translate(650,220)">
    <rect width="300" height="150" rx="18" fill="#0d9488" fill-opacity="0.16" stroke="#0d9488" stroke-width="2.5"/>
    <text x="24" y="40" font-size="15" font-weight="700" fill="#5fd4c6">STEP 2</text>
    <text x="24" y="70" font-size="20" font-weight="700" fill="#ffffff">LLM decides to call a tool</text>
    <text x="24" y="98" font-size="14" fill="#c0c0d0">Picks list_pull_requests</text>
    <text x="24" y="118" font-size="14" fill="#c0c0d0">and its arguments.</text>
  </g>

  <g transform="translate(1140,220)">
    <rect width="300" height="150" rx="18" fill="#d97706" fill-opacity="0.16" stroke="#d97706" stroke-width="2.5"/>
    <text x="24" y="40" font-size="15" font-weight="700" fill="#f3b978">STEP 3</text>
    <text x="24" y="70" font-size="20" font-weight="700" fill="#ffffff">Client forwards the call</text>
    <text x="24" y="98" font-size="14" fill="#c0c0d0">Routes the request to the</text>
    <text x="24" y="118" font-size="14" fill="#c0c0d0">right MCP server.</text>
  </g>

  <g transform="translate(1140,470)">
    <rect width="300" height="150" rx="18" fill="#f5576c" fill-opacity="0.16" stroke="#f5576c" stroke-width="2.5"/>
    <text x="24" y="40" font-size="15" font-weight="700" fill="#f5a3ac">STEP 4</text>
    <text x="24" y="70" font-size="20" font-weight="700" fill="#ffffff">Server executes</text>
    <text x="24" y="98" font-size="14" fill="#c0c0d0">Calls the real GitHub API</text>
    <text x="24" y="118" font-size="14" fill="#c0c0d0">and returns a result.</text>
  </g>

  <g transform="translate(650,470)">
    <rect width="300" height="150" rx="18" fill="#ec4899" fill-opacity="0.16" stroke="#ec4899" stroke-width="2.5"/>
    <text x="24" y="40" font-size="15" font-weight="700" fill="#f5a8c9">STEP 5</text>
    <text x="24" y="70" font-size="20" font-weight="700" fill="#ffffff">LLM uses the result</text>
    <text x="24" y="98" font-size="14" fill="#c0c0d0">Reads the tool output and</text>
    <text x="24" y="118" font-size="14" fill="#c0c0d0">turns it into an answer.</text>
  </g>

  <!-- Arrows -->
  <path d="M460,295 L650,295" fill="none" stroke="#a0a0c0" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M950,295 L1140,295" fill="none" stroke="#a0a0c0" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M1290,370 L1290,470" fill="none" stroke="#a0a0c0" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M1140,545 L950,545" fill="none" stroke="#a0a0c0" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M650,545 C400,545 260,470 300,375" fill="none" stroke="#a0a0c0" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="440" y="470" font-size="14" fill="#8888aa" font-style="italic">loops again if the LLM needs another tool</text>

  <!-- Side note -->
  <g transform="translate(160,680)">
    <rect width="1280" height="70" rx="18" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="24" y="42" font-size="16" fill="#e0e0f0">&#128161; From your point of view it feels instant &#8212; but underneath, the client and server just had a full round trip.</text>
  </g>

  <!-- Footer -->
  <text x="80" y="860" font-size="14" fill="#8888aa">SaturdAI &#183; Week 3: MCPs</text>
  <text x="1520" y="860" font-size="14" fill="#8888aa" text-anchor="end">6 / 10</text>
</svg>
