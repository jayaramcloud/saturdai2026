<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Header -->
  <text x="80" y="90" font-size="40" font-weight="800" fill="url(#titleGrad)">Common RAG Pitfalls</text>
  <text x="80" y="130" font-size="22" fill="#a0a0c0">Three ways RAG systems quietly go wrong &#8212; and the guard for each.</text>

  <!-- Card 1: Irrelevant retrieval -->
  <rect x="80" y="190" width="453" height="560" rx="22" fill="#f5576c" fill-opacity="0.10" stroke="#f5576c" stroke-width="2.5"/>
  <text x="112" y="240" font-size="32">&#127919;</text>
  <text x="112" y="286" font-size="22" font-weight="800" fill="#ffffff">Irrelevant Retrieval</text>
  <text x="112" y="316" font-size="15" fill="#a0a0c0">The database returns chunks that</text>
  <text x="112" y="336" font-size="15" fill="#a0a0c0">score similar but don&#8217;t actually</text>
  <text x="112" y="356" font-size="15" fill="#a0a0c0">answer the question.</text>
  <rect x="112" y="392" width="389" height="130" rx="12" fill="#ffffff" fill-opacity="0.05"/>
  <text x="132" y="422" font-size="14" font-weight="700" fill="#f5a3ac">EXAMPLE</text>
  <text x="132" y="450" font-size="14" fill="#c0c0d0">Asking about "return policy" pulls</text>
  <text x="132" y="472" font-size="14" fill="#c0c0d0">back shipping FAQs instead.</text>
  <text x="112" y="556" font-size="14" font-weight="700" fill="#86efac">&#9989; Guard: tune chunk size and</text>
  <text x="112" y="578" font-size="14" fill="#c0c0d0">try re-ranking top candidates.</text>

  <!-- Card 2: Stale index -->
  <rect x="573" y="190" width="453" height="560" rx="22" fill="#d97706" fill-opacity="0.10" stroke="#d97706" stroke-width="2.5"/>
  <text x="605" y="240" font-size="32">&#128260;</text>
  <text x="605" y="286" font-size="22" font-weight="800" fill="#ffffff">Stale Index</text>
  <text x="605" y="316" font-size="15" fill="#a0a0c0">Source documents changed, but</text>
  <text x="605" y="336" font-size="15" fill="#a0a0c0">the vector index was never</text>
  <text x="605" y="356" font-size="15" fill="#a0a0c0">refreshed to match.</text>
  <rect x="605" y="392" width="389" height="130" rx="12" fill="#ffffff" fill-opacity="0.05"/>
  <text x="625" y="422" font-size="14" font-weight="700" fill="#f3b978">EXAMPLE</text>
  <text x="625" y="450" font-size="14" fill="#c0c0d0">Policy doc was updated last week,</text>
  <text x="625" y="472" font-size="14" fill="#c0c0d0">but answers still cite the old rule.</text>
  <text x="605" y="556" font-size="14" font-weight="700" fill="#86efac">&#9989; Guard: schedule automatic</text>
  <text x="605" y="578" font-size="14" fill="#c0c0d0">re-indexing whenever docs change.</text>

  <!-- Card 3: Hallucination despite RAG -->
  <rect x="1066" y="190" width="453" height="560" rx="22" fill="#8b5cf6" fill-opacity="0.10" stroke="#8b5cf6" stroke-width="2.5"/>
  <text x="1098" y="240" font-size="32">&#128171;</text>
  <text x="1098" y="286" font-size="22" font-weight="800" fill="#ffffff">Hallucination Despite RAG</text>
  <text x="1098" y="316" font-size="15" fill="#a0a0c0">The model ignores the retrieved</text>
  <text x="1098" y="336" font-size="15" fill="#a0a0c0">chunks and falls back on its own</text>
  <text x="1098" y="356" font-size="15" fill="#a0a0c0">training-time guesses.</text>
  <rect x="1098" y="392" width="389" height="130" rx="12" fill="#ffffff" fill-opacity="0.05"/>
  <text x="1118" y="422" font-size="14" font-weight="700" fill="#c4b5fd">EXAMPLE</text>
  <text x="1118" y="450" font-size="14" fill="#c0c0d0">Context says "30 days," but the</text>
  <text x="1118" y="472" font-size="14" fill="#c0c0d0">answer confidently states "60 days."</text>
  <text x="1098" y="556" font-size="14" font-weight="700" fill="#86efac">&#9989; Guard: instruct the model to</text>
  <text x="1098" y="578" font-size="14" fill="#c0c0d0">answer only from context, or say "I don&#8217;t know."</text>

  <!-- Bottom note -->
  <rect x="80" y="770" width="1440" height="60" rx="16" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
  <text x="112" y="806" font-size="16" fill="#e0e0f0">&#128161; RAG reduces hallucination risk &#8212; it doesn&#8217;t eliminate it. Always check what was actually retrieved.</text>

  <!-- Footer -->
  <text x="80" y="866" font-size="14" fill="#8888aa">SaturdAI &#183; Week 2: RAG</text>
  <text x="1520" y="866" font-size="14" fill="#8888aa" text-anchor="end">9 / 10</text>
</svg>
