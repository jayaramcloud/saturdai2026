<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a0a0c0"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Header -->
  <text x="80" y="90" font-size="40" font-weight="800" fill="url(#titleGrad)">The Augmented Prompt</text>
  <text x="80" y="130" font-size="22" fill="#a0a0c0">Retrieved chunks get stitched into the context window right alongside your question.</text>

  <!-- Loop nodes -->
  <!-- 1. Original question -->
  <g transform="translate(160,220)">
    <rect width="300" height="150" rx="18" fill="#5b7cfa" fill-opacity="0.16" stroke="#5b7cfa" stroke-width="2.5"/>
    <text x="24" y="40" font-size="15" font-weight="700" fill="#9db1fb">STEP 1</text>
    <text x="24" y="70" font-size="19" font-weight="700" fill="#ffffff">Your original question</text>
    <text x="24" y="98" font-size="14" fill="#c0c0d0">"What&#8217;s our refund policy</text>
    <text x="24" y="118" font-size="14" fill="#c0c0d0">after 30 days?"</text>
  </g>

  <!-- 2. Retrieved chunks inserted -->
  <g transform="translate(650,220)">
    <rect width="300" height="150" rx="18" fill="#0d9488" fill-opacity="0.16" stroke="#0d9488" stroke-width="2.5"/>
    <text x="24" y="40" font-size="15" font-weight="700" fill="#5fd4c6">STEP 2</text>
    <text x="24" y="70" font-size="19" font-weight="700" fill="#ffffff">Chunks are inserted</text>
    <text x="24" y="98" font-size="14" fill="#c0c0d0">Top-k retrieved passages get</text>
    <text x="24" y="118" font-size="14" fill="#c0c0d0">added as extra context.</text>
  </g>

  <!-- 3. Combined prompt -->
  <g transform="translate(1140,220)">
    <rect width="300" height="150" rx="18" fill="#d97706" fill-opacity="0.16" stroke="#d97706" stroke-width="2.5"/>
    <text x="24" y="40" font-size="15" font-weight="700" fill="#f3b978">STEP 3</text>
    <text x="24" y="70" font-size="19" font-weight="700" fill="#ffffff">One combined prompt</text>
    <text x="24" y="98" font-size="14" fill="#c0c0d0">Instructions + chunks +</text>
    <text x="24" y="118" font-size="14" fill="#c0c0d0">question, sent together.</text>
  </g>

  <!-- 4. LLM answers grounded -->
  <g transform="translate(650,470)">
    <rect width="300" height="150" rx="18" fill="#ec4899" fill-opacity="0.16" stroke="#ec4899" stroke-width="2.5"/>
    <text x="24" y="40" font-size="15" font-weight="700" fill="#f5a8c9">STEP 4</text>
    <text x="24" y="70" font-size="19" font-weight="700" fill="#ffffff">LLM answers, grounded</text>
    <text x="24" y="98" font-size="14" fill="#c0c0d0">Model writes its reply using</text>
    <text x="24" y="118" font-size="14" fill="#c0c0d0">the supplied chunks as facts.</text>
  </g>

  <!-- Arrows -->
  <path d="M460,295 L650,295" fill="none" stroke="#a0a0c0" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M950,295 L1140,295" fill="none" stroke="#a0a0c0" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M1290,370 C1290,430 1120,470 950,500" fill="none" stroke="#a0a0c0" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Example prompt anatomy -->
  <g transform="translate(160,680)">
    <rect width="1280" height="150" rx="18" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="24" y="34" font-size="16" font-weight="700" fill="#c4b5fd">&#128220; What the model actually receives</text>
    <text x="24" y="62" font-size="14" fill="#9db1fb" font-weight="700">[System] Answer only using the context below. If it&#8217;s not there, say you don&#8217;t know.</text>
    <text x="24" y="88" font-size="14" fill="#5fd4c6" font-weight="700">[Context] "Refunds after 30 days are issued as store credit..." (+ 2 more chunks)</text>
    <text x="24" y="114" font-size="14" fill="#f3b978" font-weight="700">[Question] What&#8217;s our refund policy after 30 days?</text>
    <text x="24" y="140" font-size="13" fill="#8888aa" font-style="italic">All three pieces travel together, every single request &#8212; there&#8217;s no persistent memory of the docs.</text>
  </g>

  <!-- Footer -->
  <text x="80" y="860" font-size="14" fill="#8888aa">SaturdAI &#183; Week 2: RAG</text>
  <text x="1520" y="860" font-size="14" fill="#8888aa" text-anchor="end">7 / 10</text>
</svg>
