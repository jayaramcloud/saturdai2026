<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a0a0c0"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Header -->
  <text x="80" y="90" font-size="40" font-weight="800" fill="url(#titleGrad)">The Retrieval Step</text>
  <text x="80" y="130" font-size="22" fill="#a0a0c0">Your question gets the same embedding treatment as the documents did.</text>

  <!-- 1: user query -->
  <g transform="translate(80,240)">
    <rect width="280" height="150" rx="18" fill="#5b7cfa" fill-opacity="0.16" stroke="#5b7cfa" stroke-width="2.5"/>
    <text x="24" y="40" font-size="14" font-weight="700" fill="#9db1fb">1. USER QUESTION</text>
    <text x="24" y="76" font-size="17" font-weight="700" fill="#ffffff">"What&#8217;s our refund</text>
    <text x="24" y="98" font-size="17" font-weight="700" fill="#ffffff">policy after 30 days?"</text>
    <text x="24" y="126" font-size="13" fill="#c0c0d0">Plain natural language.</text>
  </g>

  <path d="M360,315 L440,315" fill="none" stroke="#a0a0c0" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 2: embed query -->
  <g transform="translate(440,240)">
    <rect width="260" height="150" rx="18" fill="#d97706" fill-opacity="0.16" stroke="#d97706" stroke-width="2.5"/>
    <text x="24" y="40" font-size="14" font-weight="700" fill="#f3b978">2. EMBED QUERY</text>
    <text x="130" y="90" font-size="30" text-anchor="middle">&#128290;</text>
    <text x="24" y="126" font-size="13" fill="#c0c0d0">Same embedding model turns</text>
    <text x="24" y="144" font-size="13" fill="#c0c0d0">it into a query vector.</text>
  </g>

  <path d="M700,315 L780,315" fill="none" stroke="#a0a0c0" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 3: search vector DB -->
  <g transform="translate(780,240)">
    <rect width="280" height="150" rx="18" fill="#ec4899" fill-opacity="0.16" stroke="#ec4899" stroke-width="2.5"/>
    <text x="24" y="40" font-size="14" font-weight="700" fill="#f5a8c9">3. SEARCH DATABASE</text>
    <text x="140" y="90" font-size="30" text-anchor="middle">&#128451;&#65039;</text>
    <text x="24" y="126" font-size="13" fill="#c0c0d0">Vector DB finds the closest</text>
    <text x="24" y="144" font-size="13" fill="#c0c0d0">stored chunk vectors.</text>
  </g>

  <path d="M1060,315 L1140,315" fill="none" stroke="#a0a0c0" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 4: top-k -->
  <g transform="translate(1140,240)">
    <rect width="280" height="150" rx="18" fill="#16a34a" fill-opacity="0.18" stroke="#16a34a" stroke-width="2.5"/>
    <text x="24" y="40" font-size="14" font-weight="700" fill="#86efac">4. TOP-K RESULTS</text>
    <text x="24" y="76" font-size="15" fill="#e0e0f0">Returns the k most similar</text>
    <text x="24" y="96" font-size="15" fill="#e0e0f0">chunks (e.g. k = 3&#8211;5),</text>
    <text x="24" y="118" font-size="15" fill="#e0e0f0">ranked by relevance.</text>
  </g>

  <!-- Results detail panel below -->
  <rect x="80" y="470" width="1440" height="280" rx="22" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.1"/>
  <text x="112" y="514" font-size="18" font-weight="700" fill="#ffffff">Example top-k results returned</text>

  <rect x="112" y="540" width="440" height="170" rx="14" fill="#16a34a" fill-opacity="0.14" stroke="#16a34a" stroke-width="2"/>
  <text x="132" y="570" font-size="14" font-weight="700" fill="#86efac">RANK 1 &#8226; SCORE 0.91</text>
  <text x="132" y="598" font-size="14" fill="#e0e0f0">"Refunds requested more than 30</text>
  <text x="132" y="618" font-size="14" fill="#e0e0f0">days after purchase are issued as</text>
  <text x="132" y="638" font-size="14" fill="#e0e0f0">store credit, not cash."</text>
  <text x="132" y="670" font-size="13" fill="#8888aa">Source: policies/refunds.md</text>

  <rect x="580" y="540" width="440" height="170" rx="14" fill="#0d9488" fill-opacity="0.14" stroke="#0d9488" stroke-width="2"/>
  <text x="600" y="570" font-size="14" font-weight="700" fill="#5fd4c6">RANK 2 &#8226; SCORE 0.84</text>
  <text x="600" y="598" font-size="14" fill="#e0e0f0">"Standard refund window is 30</text>
  <text x="600" y="618" font-size="14" fill="#e0e0f0">days from delivery for all physical</text>
  <text x="600" y="638" font-size="14" fill="#e0e0f0">goods."</text>
  <text x="600" y="670" font-size="13" fill="#8888aa">Source: policies/refunds.md</text>

  <rect x="1048" y="540" width="440" height="170" rx="14" fill="#8b5cf6" fill-opacity="0.14" stroke="#8b5cf6" stroke-width="2"/>
  <text x="1068" y="570" font-size="14" font-weight="700" fill="#c4b5fd">RANK 3 &#8226; SCORE 0.77</text>
  <text x="1068" y="598" font-size="14" fill="#e0e0f0">"Digital products are non-</text>
  <text x="1068" y="618" font-size="14" fill="#e0e0f0">refundable once downloaded,</text>
  <text x="1068" y="638" font-size="14" fill="#e0e0f0">regardless of timeframe."</text>
  <text x="1068" y="670" font-size="13" fill="#8888aa">Source: policies/digital-goods.md</text>

  <text x="112" y="792" font-size="14" fill="#8888aa" font-style="italic">These chunks &#8212; not the whole knowledge base &#8212; are what gets handed to the LLM next.</text>

  <!-- Footer -->
  <text x="80" y="866" font-size="14" fill="#8888aa">SaturdAI &#183; Week 2: RAG</text>
  <text x="1520" y="866" font-size="14" fill="#8888aa" text-anchor="end">6 / 10</text>
</svg>
