<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a0a0c0"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Header -->
  <text x="80" y="90" font-size="40" font-weight="800" fill="url(#titleGrad)">How a Conversation With an LLM Works</text>
  <text x="80" y="130" font-size="22" fill="#a0a0c0">You don&#8217;t need to know the internals &#8212; just this loop.</text>

  <!-- Loop nodes -->
  <!-- 1. You write a prompt -->
  <g transform="translate(160,220)">
    <rect width="300" height="150" rx="18" fill="#5b7cfa" fill-opacity="0.16" stroke="#5b7cfa" stroke-width="2.5"/>
    <text x="24" y="40" font-size="15" font-weight="700" fill="#9db1fb">STEP 1</text>
    <text x="24" y="70" font-size="20" font-weight="700" fill="#ffffff">You write a prompt</text>
    <text x="24" y="98" font-size="14" fill="#c0c0d0">A question, instruction,</text>
    <text x="24" y="118" font-size="14" fill="#c0c0d0">or task in plain language.</text>
  </g>

  <!-- 2. Model reads prompt + history -->
  <g transform="translate(650,220)">
    <rect width="300" height="150" rx="18" fill="#0d9488" fill-opacity="0.16" stroke="#0d9488" stroke-width="2.5"/>
    <text x="24" y="40" font-size="15" font-weight="700" fill="#5fd4c6">STEP 2</text>
    <text x="24" y="70" font-size="20" font-weight="700" fill="#ffffff">Model reads everything</text>
    <text x="24" y="98" font-size="14" fill="#c0c0d0">Your prompt + the whole</text>
    <text x="24" y="118" font-size="14" fill="#c0c0d0">conversation so far.</text>
  </g>

  <!-- 3. Model generates a response -->
  <g transform="translate(1140,220)">
    <rect width="300" height="150" rx="18" fill="#d97706" fill-opacity="0.16" stroke="#d97706" stroke-width="2.5"/>
    <text x="24" y="40" font-size="15" font-weight="700" fill="#f3b978">STEP 3</text>
    <text x="24" y="70" font-size="20" font-weight="700" fill="#ffffff">Model responds</text>
    <text x="24" y="98" font-size="14" fill="#c0c0d0">Generated word by word,</text>
    <text x="24" y="118" font-size="14" fill="#c0c0d0">predicting what fits best.</text>
  </g>

  <!-- 4. You read and refine -->
  <g transform="translate(650,470)">
    <rect width="300" height="150" rx="18" fill="#ec4899" fill-opacity="0.16" stroke="#ec4899" stroke-width="2.5"/>
    <text x="24" y="40" font-size="15" font-weight="700" fill="#f5a8c9">STEP 4</text>
    <text x="24" y="70" font-size="20" font-weight="700" fill="#ffffff">You read &#38; refine</text>
    <text x="24" y="98" font-size="14" fill="#c0c0d0">Ask a follow-up, correct it,</text>
    <text x="24" y="118" font-size="14" fill="#c0c0d0">or push it further.</text>
  </g>

  <!-- Arrows: 1->2, 2->3, 3->4 (down+left), 4->1 (loop back up) -->
  <path d="M460,295 L650,295" fill="none" stroke="#a0a0c0" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M950,295 L1140,295" fill="none" stroke="#a0a0c0" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M1290,370 C1290,430 1120,470 950,500" fill="none" stroke="#a0a0c0" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M650,545 C400,545 260,470 300,375" fill="none" stroke="#a0a0c0" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="440" y="470" font-size="14" fill="#8888aa" font-style="italic">loops back for as long as you keep chatting</text>

  <!-- Side notes: two key concepts -->
  <g transform="translate(160,680)">
    <rect width="620" height="150" rx="18" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="24" y="38" font-size="18" font-weight="700" fill="#c4b5fd">&#128220; System Instructions</text>
    <text x="24" y="66" font-size="14" fill="#c0c0d0">A hidden &#8220;stage direction&#8221; set before you</text>
    <text x="24" y="88" font-size="14" fill="#c0c0d0">arrive &#8212; e.g. &#8220;be concise&#8221; or &#8220;act as a tutor.&#8221;</text>
    <text x="24" y="112" font-size="14" fill="#c0c0d0">Apps like ChatGPT &#38; Claude set some of this</text>
    <text x="24" y="132" font-size="14" fill="#c0c0d0">for you; &#8220;Custom Instructions&#8221; let you add more.</text>
  </g>

  <g transform="translate(820,680)">
    <rect width="620" height="150" rx="18" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="24" y="38" font-size="18" font-weight="700" fill="#7be0a0">&#129504; Context Window</text>
    <text x="24" y="66" font-size="14" fill="#c0c0d0">How much conversation the model can</text>
    <text x="24" y="88" font-size="14" fill="#c0c0d0">&#8220;see&#8221; at once. Go past it, and the model starts</text>
    <text x="24" y="112" font-size="14" fill="#c0c0d0">forgetting the earliest messages &#8212; not you</text>
    <text x="24" y="132" font-size="14" fill="#c0c0d0">personally, just that chat.</text>
  </g>

  <!-- Footer -->
  <text x="80" y="860" font-size="14" fill="#8888aa">SaturdAI &#183; Day 1: Intro to LLMs</text>
  <text x="1520" y="860" font-size="14" fill="#8888aa" text-anchor="end">5 / 20</text>
</svg>
