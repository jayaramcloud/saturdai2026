<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Header -->
  <text x="80" y="90" font-size="40" font-weight="800" fill="url(#titleGrad)">Prompting Basics</text>
  <text x="80" y="130" font-size="22" fill="#a0a0c0">Same question, two ways to ask it &#8212; the difference is the answer you get back.</text>

  <!-- Vague prompt (left) -->
  <rect x="80" y="190" width="680" height="600" rx="24" fill="#ec4899" fill-opacity="0.08" stroke="#ec4899" stroke-width="2.5"/>
  <text x="112" y="238" font-size="15" font-weight="800" fill="#f5a8c9">&#10060; VAGUE</text>
  <rect x="112" y="260" width="616" height="90" rx="14" fill="#ffffff" fill-opacity="0.06"/>
  <text x="134" y="298" font-size="19" fill="#ffffff" font-style="italic">&#8220;Help me with my trip.&#8221;</text>
  <text x="134" y="326" font-size="14" fill="#a0a0c0">No destination, dates, budget, or goal.</text>

  <text x="112" y="392" font-size="16" font-weight="700" fill="#f5a8c9">What the model has to guess:</text>
  <text x="134" y="424" font-size="15" fill="#c0c0d0">&#8226; Where you&#8217;re going</text>
  <text x="134" y="452" font-size="15" fill="#c0c0d0">&#8226; When, and for how long</text>
  <text x="134" y="480" font-size="15" fill="#c0c0d0">&#8226; Budget and travel style</text>
  <text x="134" y="508" font-size="15" fill="#c0c0d0">&#8226; What kind of help you actually want</text>

  <rect x="112" y="548" width="616" height="200" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="134" y="582" font-size="14" font-weight="700" fill="#f5a8c9">RESULT</text>
  <text x="134" y="612" font-size="15" fill="#c0c0d0">A generic, one-size-fits-all answer that</text>
  <text x="134" y="636" font-size="15" fill="#c0c0d0">covers everything a little and nothing well &#8212;</text>
  <text x="134" y="660" font-size="15" fill="#c0c0d0">you&#8217;ll likely need 2&#8211;3 follow-ups just to</text>
  <text x="134" y="684" font-size="15" fill="#c0c0d0">get to something useful.</text>

  <!-- Arrow -->
  <g transform="translate(800,490)">
    <path d="M-30,0 L30,0 M14,-16 L30,0 L14,16" fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Good prompt (right) -->
  <rect x="840" y="190" width="680" height="600" rx="24" fill="#16a34a" fill-opacity="0.08" stroke="#16a34a" stroke-width="2.5"/>
  <text x="872" y="238" font-size="15" font-weight="800" fill="#86efac">&#9989; SPECIFIC</text>
  <rect x="872" y="260" width="616" height="130" rx="14" fill="#ffffff" fill-opacity="0.06"/>
  <text x="894" y="292" font-size="17" fill="#ffffff" font-style="italic">&#8220;Plan a 4-day budget trip to Lisbon</text>
  <text x="894" y="318" font-size="17" fill="#ffffff" font-style="italic">in October for 2 adults who love food</text>
  <text x="894" y="344" font-size="17" fill="#ffffff" font-style="italic">and walking, not nightlife. Suggest a</text>
  <text x="894" y="370" font-size="17" fill="#ffffff" font-style="italic">day-by-day itinerary.&#8221;</text>

  <text x="872" y="432" font-size="16" font-weight="700" fill="#86efac">What made it specific:</text>
  <text x="894" y="464" font-size="15" fill="#c0c0d0">&#8226; Destination and trip length</text>
  <text x="894" y="492" font-size="15" fill="#c0c0d0">&#8226; Timing, travelers, and budget level</text>
  <text x="894" y="520" font-size="15" fill="#c0c0d0">&#8226; Interests to steer recommendations</text>
  <text x="894" y="548" font-size="15" fill="#c0c0d0">&#8226; Exact output format requested</text>

  <rect x="872" y="588" width="616" height="160" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="894" y="622" font-size="14" font-weight="700" fill="#86efac">RESULT</text>
  <text x="894" y="652" font-size="15" fill="#c0c0d0">A ready-to-use itinerary tailored to your</text>
  <text x="894" y="676" font-size="15" fill="#c0c0d0">actual trip &#8212; usable on the first try.</text>

  <!-- Footer -->
  <text x="80" y="866" font-size="14" fill="#8888aa">SaturdAI &#183; Day 1: Intro to LLMs</text>
  <text x="1520" y="866" font-size="14" fill="#8888aa" text-anchor="end">7 / 20</text>
</svg>
