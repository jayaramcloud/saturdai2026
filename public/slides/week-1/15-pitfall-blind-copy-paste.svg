<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Header -->
  <text x="80" y="90" font-size="40" font-weight="800" fill="url(#titleGrad)">Pitfall: Blind Copy-Paste</text>
  <text x="80" y="130" font-size="22" fill="#a0a0c0">Treating the output as final instead of as a first draft to check.</text>

  <!-- Blind (left) -->
  <rect x="80" y="190" width="680" height="600" rx="24" fill="#ec4899" fill-opacity="0.08" stroke="#ec4899" stroke-width="2.5"/>
  <text x="112" y="238" font-size="15" font-weight="800" fill="#f5a8c9">&#10060; PASTE AND SHIP</text>
  <rect x="112" y="260" width="616" height="90" rx="14" fill="#ffffff" fill-opacity="0.06"/>
  <text x="134" y="298" font-size="19" fill="#ffffff" font-style="italic">Copy the generated code straight</text>
  <text x="134" y="322" font-size="19" fill="#ffffff" font-style="italic">into production, unread.</text>

  <text x="112" y="392" font-size="16" font-weight="700" fill="#f5a8c9">What gets skipped:</text>
  <text x="134" y="424" font-size="15" fill="#c0c0d0">&#8226; Reading the code line by line</text>
  <text x="134" y="452" font-size="15" fill="#c0c0d0">&#8226; Running it against real test cases</text>
  <text x="134" y="480" font-size="15" fill="#c0c0d0">&#8226; Checking the email's tone before sending</text>
  <text x="134" y="508" font-size="15" fill="#c0c0d0">&#8226; Confirming numbers against the source</text>

  <rect x="112" y="548" width="616" height="200" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="134" y="582" font-size="14" font-weight="700" fill="#f5a8c9">RESULT</text>
  <text x="134" y="612" font-size="15" fill="#c0c0d0">A subtle bug ships to users, or an</text>
  <text x="134" y="636" font-size="15" fill="#c0c0d0">off-tone email goes out to a client &#8212;</text>
  <text x="134" y="660" font-size="15" fill="#c0c0d0">and it's your name on it, not the</text>
  <text x="134" y="684" font-size="15" fill="#c0c0d0">model's.</text>

  <!-- Arrow -->
  <g transform="translate(800,490)">
    <path d="M-30,0 L30,0 M14,-16 L30,0 L14,16" fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Review (right) -->
  <rect x="840" y="190" width="680" height="600" rx="24" fill="#16a34a" fill-opacity="0.08" stroke="#16a34a" stroke-width="2.5"/>
  <text x="872" y="238" font-size="15" font-weight="800" fill="#86efac">&#9989; TREAT IT AS A DRAFT</text>
  <rect x="872" y="260" width="616" height="90" rx="14" fill="#ffffff" fill-opacity="0.06"/>
  <text x="894" y="292" font-size="17" fill="#ffffff" font-style="italic">Read the code, run it against real</text>
  <text x="894" y="318" font-size="17" fill="#ffffff" font-style="italic">inputs, then commit.</text>

  <text x="872" y="392" font-size="16" font-weight="700" fill="#86efac">What review adds:</text>
  <text x="894" y="424" font-size="15" fill="#c0c0d0">&#8226; A pass over logic and edge cases</text>
  <text x="894" y="452" font-size="15" fill="#c0c0d0">&#8226; A quick test run before trusting it</text>
  <text x="894" y="480" font-size="15" fill="#c0c0d0">&#8226; A tone check for anything client-facing</text>
  <text x="894" y="508" font-size="15" fill="#c0c0d0">&#8226; A source check for any hard numbers</text>

  <rect x="872" y="588" width="616" height="160" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="894" y="622" font-size="14" font-weight="700" fill="#86efac">RESULT</text>
  <text x="894" y="652" font-size="15" fill="#c0c0d0">You still move fast, but the mistakes</text>
  <text x="894" y="676" font-size="15" fill="#c0c0d0">get caught before they reach anyone else.</text>

  <!-- Footer -->
  <text x="80" y="866" font-size="14" fill="#8888aa">SaturdAI &#183; Day 1: Intro to LLMs</text>
  <text x="1520" y="866" font-size="14" fill="#8888aa" text-anchor="end">15 / 17</text>
</svg>
