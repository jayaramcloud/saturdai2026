<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Header -->
  <text x="80" y="90" font-size="40" font-weight="800" fill="url(#titleGrad)">Ethics: Bias Baked into the Data</text>
  <text x="80" y="130" font-size="22" fill="#a0a0c0">A model trained on the internet inherits the internet's blind spots.</text>

  <!-- Unquestioned (left) -->
  <rect x="80" y="190" width="680" height="600" rx="24" fill="#ec4899" fill-opacity="0.08" stroke="#ec4899" stroke-width="2.5"/>
  <text x="112" y="238" font-size="15" font-weight="800" fill="#f5a8c9">&#10060; TAKEN AT FACE VALUE</text>
  <rect x="112" y="260" width="616" height="90" rx="14" fill="#ffffff" fill-opacity="0.06"/>
  <text x="134" y="298" font-size="19" fill="#ffffff" font-style="italic">&#8220;Generate five photos of a</text>
  <text x="134" y="322" font-size="19" fill="#ffffff" font-style="italic">&#8216;CEO&#8217; and a &#8216;nurse.&#8217;&#8221;</text>

  <text x="112" y="392" font-size="16" font-weight="700" fill="#f5a8c9">Where the bias comes from:</text>
  <text x="134" y="424" font-size="15" fill="#c0c0d0">&#8226; Training data reflects historical and</text>
  <text x="134" y="448" font-size="15" fill="#c0c0d0">&#160;&#160;online patterns, not an ideal world</text>
  <text x="134" y="476" font-size="15" fill="#c0c0d0">&#8226; Under-represented groups in the data</text>
  <text x="134" y="500" font-size="15" fill="#c0c0d0">&#160;&#160;get under-represented outputs</text>
  <text x="134" y="528" font-size="15" fill="#c0c0d0">&#8226; The model doesn't know it's biased &#8212;</text>
  <text x="134" y="552" font-size="15" fill="#c0c0d0">&#160;&#160;it's just reproducing patterns</text>

  <rect x="112" y="588" width="616" height="160" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="134" y="622" font-size="14" font-weight="700" fill="#f5a8c9">RESULT</text>
  <text x="134" y="652" font-size="15" fill="#c0c0d0">Skewed images, stereotyped assumptions,</text>
  <text x="134" y="676" font-size="15" fill="#c0c0d0">or uneven quality of advice across groups &#8212;</text>
  <text x="134" y="700" font-size="15" fill="#c0c0d0">delivered with the same confident tone as everything else.</text>

  <!-- Arrow -->
  <g transform="translate(800,490)">
    <path d="M-30,0 L30,0 M14,-16 L30,0 L14,16" fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Aware (right) -->
  <rect x="840" y="190" width="680" height="600" rx="24" fill="#16a34a" fill-opacity="0.08" stroke="#16a34a" stroke-width="2.5"/>
  <text x="872" y="238" font-size="15" font-weight="800" fill="#86efac">&#9989; USED WITH AWARENESS</text>
  <rect x="872" y="260" width="616" height="90" rx="14" fill="#ffffff" fill-opacity="0.06"/>
  <text x="894" y="292" font-size="17" fill="#ffffff" font-style="italic">Same request &#8212; but the results</text>
  <text x="894" y="316" font-size="17" fill="#ffffff" font-style="italic">get a second look before use.</text>

  <text x="872" y="392" font-size="16" font-weight="700" fill="#86efac">What awareness looks like:</text>
  <text x="894" y="424" font-size="15" fill="#c0c0d0">&#8226; Noticing when output skews toward one</text>
  <text x="894" y="448" font-size="15" fill="#c0c0d0">&#160;&#160;group, style, or assumption</text>
  <text x="894" y="476" font-size="15" fill="#c0c0d0">&#8226; Asking for a wider range explicitly when</text>
  <text x="894" y="500" font-size="15" fill="#c0c0d0">&#160;&#160;it matters (&#8220;show varied ages, genders&#8221;)</text>
  <text x="894" y="528" font-size="15" fill="#c0c0d0">&#8226; Not treating a single output as</text>
  <text x="894" y="552" font-size="15" fill="#c0c0d0">&#160;&#160;representative of &#8220;the truth&#8221;</text>

  <rect x="872" y="588" width="616" height="160" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="894" y="622" font-size="14" font-weight="700" fill="#86efac">RESULT</text>
  <text x="894" y="652" font-size="15" fill="#c0c0d0">You still get useful output, but you catch</text>
  <text x="894" y="676" font-size="15" fill="#c0c0d0">skewed assumptions before they shape a</text>
  <text x="894" y="700" font-size="15" fill="#c0c0d0">decision, a hire, or a piece of content that goes out publicly.</text>

  <!-- Footer -->
  <text x="80" y="866" font-size="14" fill="#8888aa">SaturdAI &#183; Day 1: Intro to LLMs</text>
  <text x="1520" y="866" font-size="14" fill="#8888aa" text-anchor="end">18 / 20</text>
</svg>
