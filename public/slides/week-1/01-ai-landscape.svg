<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Header -->
  <text x="80" y="90" font-size="40" font-weight="800" fill="url(#titleGrad)">The AI Landscape</text>
  <text x="80" y="130" font-size="22" fill="#a0a0c0">Where do Large Language Models fit in? A beginner&#8217;s map of the terms you&#8217;ll hear.</text>

  <!-- Nested zones (outer to inner) -->
  <!-- AI -->
  <rect x="80" y="180" width="1180" height="640" rx="28" fill="#5b7cfa" fill-opacity="0.10" stroke="#5b7cfa" stroke-width="2.5"/>
  <text x="112" y="228" font-size="26" font-weight="700" fill="#9db1fb">Artificial Intelligence</text>
  <text x="112" y="258" font-size="17" fill="#a0a0c0">Any technique that lets computers perform tasks that seem to need human smarts.</text>

  <!-- ML -->
  <rect x="160" y="290" width="1020" height="490" rx="26" fill="#0d9488" fill-opacity="0.14" stroke="#0d9488" stroke-width="2.5"/>
  <text x="192" y="336" font-size="24" font-weight="700" fill="#5fd4c6">Machine Learning</text>
  <text x="192" y="365" font-size="17" fill="#a0a0c0">Systems that learn patterns from examples, instead of following fixed rules.</text>

  <!-- Deep Learning -->
  <rect x="240" y="398" width="860" height="342" rx="24" fill="#d97706" fill-opacity="0.16" stroke="#d97706" stroke-width="2.5"/>
  <text x="272" y="442" font-size="22" font-weight="700" fill="#f3b978">Deep Learning</text>
  <text x="272" y="470" font-size="17" fill="#a0a0c0">Machine learning using layered &#8220;neural networks&#8221; loosely inspired by the brain.</text>

  <!-- Generative AI -->
  <rect x="320" y="502" width="700" height="200" rx="22" fill="#ec4899" fill-opacity="0.18" stroke="#ec4899" stroke-width="2.5"/>
  <text x="352" y="544" font-size="20" font-weight="700" fill="#f5a8c9">Generative AI</text>
  <text x="352" y="571" font-size="16" fill="#a0a0c0">Models that create new content: text, images, audio, code &#8212; not just predictions.</text>

  <!-- LLMs (innermost, highlighted) -->
  <rect x="400" y="606" width="540" height="96" rx="20" fill="#8b5cf6" fill-opacity="0.35" stroke="#c4b5fd" stroke-width="3" filter="url(#glow)"/>
  <text x="670" y="646" font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle">Large Language Models (LLMs)</text>
  <text x="670" y="674" font-size="16" fill="#e9e4fc" text-anchor="middle">Generative AI trained on massive amounts of text &#8212; this is what you&#8217;ll use.</text>

  <!-- You are here pin -->
  <g transform="translate(1000,654)">
    <path d="M0,0 C-22,-30 -22,-52 0,-52 C22,-52 22,-30 0,0 Z" fill="#f5576c"/>
    <circle cx="0" cy="-38" r="9" fill="#ffffff"/>
  </g>
  <text x="1030" y="640" font-size="18" font-weight="700" fill="#ffffff">You are here</text>
  <text x="1030" y="663" font-size="15" fill="#c0c0d0">Day 1: you&#8217;re learning to use an LLM.</text>

  <!-- Side panel: quick examples -->
  <rect x="1300" y="180" width="220" height="640" rx="20" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
  <text x="1330" y="222" font-size="18" font-weight="700" fill="#ffffff">Familiar examples</text>

  <text x="1330" y="264" font-size="15" font-weight="700" fill="#9db1fb">AI</text>
  <text x="1330" y="286" font-size="14" fill="#a0a0c0">Spam filters, GPS routing</text>

  <text x="1330" y="326" font-size="15" font-weight="700" fill="#5fd4c6">ML</text>
  <text x="1330" y="348" font-size="14" fill="#a0a0c0">Netflix recommendations</text>

  <text x="1330" y="388" font-size="15" font-weight="700" fill="#f3b978">Deep Learning</text>
  <text x="1330" y="410" font-size="14" fill="#a0a0c0">Face recognition, self-driving vision</text>

  <text x="1330" y="450" font-size="15" font-weight="700" fill="#f5a8c9">Generative AI</text>
  <text x="1330" y="472" font-size="14" fill="#a0a0c0">Image generators, music AI</text>

  <text x="1330" y="512" font-size="15" font-weight="700" fill="#c4b5fd">LLMs</text>
  <text x="1330" y="534" font-size="14" fill="#a0a0c0">ChatGPT, Claude, Gemini</text>

  <line x1="1330" y1="560" x2="1490" y2="560" stroke="#ffffff" stroke-opacity="0.1"/>
  <text x="1330" y="600" font-size="14" fill="#8888aa" font-style="italic">Each ring is a subset of the one</text>
  <text x="1330" y="620" font-size="14" fill="#8888aa" font-style="italic">around it &#8212; LLMs are one kind</text>
  <text x="1330" y="640" font-size="14" fill="#8888aa" font-style="italic">of generative AI.</text>

  <!-- Footer -->
  <text x="80" y="860" font-size="14" fill="#8888aa">SaturdAI &#183; Day 1: Intro to LLMs</text>
  <text x="1520" y="860" font-size="14" fill="#8888aa" text-anchor="end">1 / 10</text>
</svg>
